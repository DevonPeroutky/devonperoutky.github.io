<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Devon Peroutky</title>
  <meta name="description" content="Devon Peroutky — Software Engineer">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>">
  <link rel="stylesheet" href="css/custom.css">
  <script src="https://cdn.tailwindcss.com?plugins=typography"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            surface: {
              light: '#fafafa',
              dark: '#0a0a0a',
            },
            muted: {
              light: '#737373',
              dark: '#a3a3a3',
            }
          }
        }
      }
    }
  </script>
</head>
<body class="bg-surface-light dark:bg-surface-dark text-neutral-900 dark:text-neutral-100 min-h-screen flex flex-col">

  <!-- Theme Toggle -->
  <header class="w-full max-w-2xl mx-auto px-6 pt-6 flex justify-end">
    <button
      id="theme-toggle"
      type="button"
      aria-label="Toggle dark mode"
      class="p-2 rounded-lg hover:bg-neutral-200 dark:hover:bg-neutral-800 focus-visible:ring-2 focus-visible:ring-neutral-400"
    >
      <!-- Sun icon (shown in dark mode) -->
      <svg class="hidden dark:block w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="5"/>
        <path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
      </svg>
      <!-- Moon icon (shown in light mode) -->
      <svg class="block dark:hidden w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/>
      </svg>
    </button>
  </header>

  <!-- Main Content -->
  <main class="flex-1 flex items-center justify-center px-6">
    <div class="max-w-2xl w-full py-20">

      <!-- Intro -->
      <section aria-label="Introduction">
        <h1 class="text-4xl sm:text-5xl font-bold tracking-tight">Devon Peroutky</h1>
        <p class="mt-4 text-lg text-muted-light dark:text-muted-dark leading-relaxed">
          Software Engineer. Building things for the web.
        </p>
        <p class="mt-3 text-base text-muted-light dark:text-muted-dark leading-relaxed">
          Currently exploring new ideas and working on projects I care about.
          Always interested in thoughtful software and hard problems.
        </p>
      </section>

      <!-- Social Links -->
      <section aria-label="Links" class="mt-10">
        <nav class="flex gap-5 items-center">
          <a
            href="https://github.com/DevonPeroutky/"
            target="_blank"
            rel="noopener noreferrer"
            aria-label="GitHub"
            class="text-muted-light dark:text-muted-dark hover:text-neutral-900 dark:hover:text-neutral-100"
          >
            <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24">
              <path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0024 12c0-6.63-5.37-12-12-12z"/>
            </svg>
          </a>
          <a
            href="https://www.linkedin.com/in/devon-peroutky-806748146"
            target="_blank"
            rel="noopener noreferrer"
            aria-label="LinkedIn"
            class="text-muted-light dark:text-muted-dark hover:text-neutral-900 dark:hover:text-neutral-100"
          >
            <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24">
              <path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 01-2.063-2.065 2.064 2.064 0 112.063 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/>
            </svg>
          </a>
        </nav>
      </section>

      <!-- Projects (optional placeholder) -->
      <section aria-label="Projects" class="mt-16">
        <h2 class="text-sm font-semibold uppercase tracking-wider text-muted-light dark:text-muted-dark">Projects</h2>
        <ul class="mt-4 space-y-4">
          <li>
            <a href="https://github.com/DevonPeroutky/" target="_blank" rel="noopener noreferrer"
               class="group block p-4 -mx-4 rounded-lg hover:bg-neutral-100 dark:hover:bg-neutral-900">
              <span class="font-medium group-hover:underline">Coming soon</span>
              <p class="mt-1 text-sm text-muted-light dark:text-muted-dark">Check back for featured projects.</p>
            </a>
          </li>
        </ul>
      </section>

    </div>
  </main>

  <!-- Footer -->
  <footer class="w-full max-w-2xl mx-auto px-6 pb-8">
    <p class="text-sm text-muted-light dark:text-muted-dark">
      &copy; 2026 Devon Peroutky
    </p>
  </footer>

  <!-- Theme Toggle Script -->
  <script>
    const toggle = document.getElementById('theme-toggle');
    const html = document.documentElement;
    const stored = localStorage.getItem('theme');
    if (stored === 'light') html.classList.remove('dark');
    else if (stored === 'dark') html.classList.add('dark');
    else if (!window.matchMedia('(prefers-color-scheme: dark)').matches) html.classList.remove('dark');
    toggle.addEventListener('click', () => {
      html.classList.toggle('dark');
      localStorage.setItem('theme', html.classList.contains('dark') ? 'dark' : 'light');
    });
  </script>
</body>
</html>
